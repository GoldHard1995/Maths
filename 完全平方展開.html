<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>完全平方展開遊戲</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 隱藏滾動條的工具類 */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-100 font-sans text-gray-800">
  <!-- 應用的主要掛載點 -->
  <div id="app" class="h-screen w-screen overflow-hidden"></div>

  <script>
    // ----------------------------------------------------------------------
    // 題目生成器 (完全平方)
    // ----------------------------------------------------------------------
    const vars = ['x', 'y', 'm', 'n'];

    const generateLevel1 = () => {
      const q = [];
      for (let i = 0; i < 10; i++) {
        const v = vars[Math.floor(Math.random() * vars.length)];
        const c = Math.floor(Math.random() * 9) + 2; // 2 to 10
        const isPlus = Math.random() > 0.5;
        const varFirst = Math.random() > 0.5;
        
        if (varFirst) {
          // (v ± c)^2
          q.push({
            text: `(${v} ${isPlus ? '+' : '-'} ${c})^2`,
            a: [v],
            b: [`${c}`],
            intermediate: `(${v})^2 ${isPlus ? '+' : '-'} 2(${v})(${c}) + (${c})^2`,
            ans: [
              `${v}^2${isPlus ? '+' : '-'}${2 * c}${v}+${c * c}`,
              `${c * c}${isPlus ? '+' : '-'}${2 * c}${v}+${v}^2`
            ]
          });
        } else {
          // (c ± v)^2
          q.push({
            text: `(${c} ${isPlus ? '+' : '-'} ${v})^2`,
            a: [`${c}`],
            b: [v],
            intermediate: `(${c})^2 ${isPlus ? '+' : '-'} 2(${c})(${v}) + (${v})^2`,
            ans: [
              `${c * c}${isPlus ? '+' : '-'}${2 * c}${v}+${v}^2`,
              `${v}^2${isPlus ? '+' : '-'}${2 * c}${v}+${c * c}`
            ]
          });
        }
      }
      return q;
    };

    const generateLevel2 = () => {
      const q = [];
      for (let i = 0; i < 10; i++) {
        const r = Math.random();
        const isPlus = Math.random() > 0.5;
        const v1 = vars[Math.floor(Math.random() * vars.length)];

        if (r < 0.5) {
          // (k1 v1 ± c)^2
          const k1 = Math.floor(Math.random() * 4) + 2; // 2 to 5
          const c = Math.floor(Math.random() * 8) + 2; // 2 to 9
          q.push({
            text: `(${k1}${v1} ${isPlus ? '+' : '-'} ${c})^2`,
            a: [`${k1}${v1}`],
            b: [`${c}`],
            intermediate: `(${k1}${v1})^2 ${isPlus ? '+' : '-'} 2(${k1}${v1})(${c}) + (${c})^2`,
            ans: [
              `${k1 * k1}${v1}^2${isPlus ? '+' : '-'}${2 * k1 * c}${v1}+${c * c}`,
              `${c * c}${isPlus ? '+' : '-'}${2 * k1 * c}${v1}+${k1 * k1}${v1}^2`
            ]
          });
        } else {
          // (k1 v1 ± k2 v2)^2
          let v2 = vars[Math.floor(Math.random() * vars.length)];
          while (v1 === v2) v2 = vars[Math.floor(Math.random() * vars.length)];
          const k1 = Math.floor(Math.random() * 4) + 2;
          const k2 = Math.floor(Math.random() * 4) + 2;
          
          q.push({
            text: `(${k1}${v1} ${isPlus ? '+' : '-'} ${k2}${v2})^2`,
            a: [`${k1}${v1}`],
            b: [`${k2}${v2}`],
            intermediate: `(${k1}${v1})^2 ${isPlus ? '+' : '-'} 2(${k1}${v1})(${k2}${v2}) + (${k2}${v2})^2`,
            ans: [
              `${k1 * k1}${v1}^2${isPlus ? '+' : '-'}${2 * k1 * k2}${v1}${v2}+${k2 * k2}${v2}^2`,
              `${k1 * k1}${v1}^2${isPlus ? '+' : '-'}${2 * k1 * k2}${v2}${v1}+${k2 * k2}${v2}^2`,
              `${k2 * k2}${v2}^2${isPlus ? '+' : '-'}${2 * k1 * k2}${v1}${v2}+${k1 * k1}${v1}^2`,
              `${k2 * k2}${v2}^2${isPlus ? '+' : '-'}${2 * k1 * k2}${v2}${v1}+${k1 * k1}${v1}^2`
            ]
          });
        }
      }
      return q;
    };

    const generateLevel3 = () => {
      const q = [];
      for (let i = 0; i < 10; i++) {
        const r = Math.random();
        const isPlus = Math.random() > 0.5;
        const v1 = vars[Math.floor(Math.random() * vars.length)];
        
        if (r < 0.25) {
          // (-v1 ± c)^2
          const c = Math.floor(Math.random() * 8) + 2; 
          const midSign = isPlus ? '-' : '+'; 
          q.push({
            text: `(-${v1} ${isPlus ? '+' : '-'} ${c})^2`,
            a: [`-${v1}`],
            b: [`${c}`],
            intermediate: `(-${v1})^2 ${isPlus ? '+' : '-'} 2(-${v1})(${c}) + (${c})^2`,
            ans: [
              `${v1}^2${midSign}${2 * c}${v1}+${c * c}`,
              `${c * c}${midSign}${2 * c}${v1}+${v1}^2`
            ]
          });
        } else if (r < 0.5) {
          // (-k1 v1 ± c)^2
          const k1 = Math.floor(Math.random() * 4) + 2; 
          const c = Math.floor(Math.random() * 8) + 2; 
          const midSign = isPlus ? '-' : '+';
          q.push({
            text: `(-${k1}${v1} ${isPlus ? '+' : '-'} ${c})^2`,
            a: [`-${k1}${v1}`],
            b: [`${c}`],
            intermediate: `(-${k1}${v1})^2 ${isPlus ? '+' : '-'} 2(-${k1}${v1})(${c}) + (${c})^2`,
            ans: [
              `${k1 * k1}${v1}^2${midSign}${2 * k1 * c}${v1}+${c * c}`,
              `${c * c}${midSign}${2 * k1 * c}${v1}+${k1 * k1}${v1}^2`
            ]
          });
        } else if (r < 0.75) {
          // (-k1 v1 ± k2 v2)^2
          let v2 = vars[Math.floor(Math.random() * vars.length)];
          while (v1 === v2) v2 = vars[Math.floor(Math.random() * vars.length)];
          const k1 = Math.floor(Math.random() * 4) + 2;
          const k2 = Math.floor(Math.random() * 4) + 2;
          const midSign = isPlus ? '-' : '+';
          q.push({
            text: `(-${k1}${v1} ${isPlus ? '+' : '-'} ${k2}${v2})^2`,
            a: [`-${k1}${v1}`],
            b: [`${k2}${v2}`],
            intermediate: `(-${k1}${v1})^2 ${isPlus ? '+' : '-'} 2(-${k1}${v1})(${k2}${v2}) + (${k2}${v2})^2`,
            ans: [
              `${k1 * k1}${v1}^2${midSign}${2 * k1 * k2}${v1}${v2}+${k2 * k2}${v2}^2`,
              `${k1 * k1}${v1}^2${midSign}${2 * k1 * k2}${v2}${v1}+${k2 * k2}${v2}^2`,
              `${k2 * k2}${v2}^2${midSign}${2 * k1 * k2}${v1}${v2}+${k1 * k1}${v1}^2`,
              `${k2 * k2}${v2}^2${midSign}${2 * k1 * k2}${v2}${v1}+${k1 * k1}${v1}^2`
            ]
          });
        } else {
          // 挑戰題型：k(-c ± k1 v1)^2 或 k(-k1 v1 ± c)^2
          const k = Math.floor(Math.random() * 5) + 2; // 外面的係數 2 到 6
          const k1 = Math.floor(Math.random() * 4) + 2; // 2 到 5
          const c = Math.floor(Math.random() * 8) + 2; // 2 到 9
          const midSign = isPlus ? '+' : '-';
          const isVarFirst = Math.random() > 0.5;

          if (isVarFirst) {
            // k(-k1 v1 ± c)^2
            q.push({
              text: `${k}(-${k1}${v1} ${midSign} ${c})^2`,
              a: [`-${k1}${v1}`],
              b: [`${c}`],
              intermediate: `${k}[(-${k1}${v1})^2 ${midSign} 2(-${k1}${v1})(${c}) + (${c})^2]`,
              ans: [
                `${k * k1 * k1}${v1}^2${isPlus ? '-' : '+'}${k * 2 * k1 * c}${v1}+${k * c * c}`,
                `${k * c * c}${isPlus ? '-' : '+'}${k * 2 * k1 * c}${v1}+${k * k1 * k1}${v1}^2`
              ]
            });
          } else {
            // k(-c ± k1 v1)^2 (對應你的 6(-3 + 2x)^2 要求)
            q.push({
              text: `${k}(-${c} ${midSign} ${k1}${v1})^2`,
              a: [`-${c}`],
              b: [`${k1}${v1}`],
              intermediate: `${k}[(-${c})^2 ${midSign} 2(-${c})(${k1}${v1}) + (${k1}${v1})^2]`,
              ans: [
                `${k * c * c}${isPlus ? '-' : '+'}${k * 2 * c * k1}${v1}+${k * k1 * k1}${v1}^2`,
                `${k * k1 * k1}${v1}^2${isPlus ? '-' : '+'}${k * 2 * c * k1}${v1}+${k * c * c}`
              ]
            });
          }
        }
      }
      return q;
    };

    // ----------------------------------------------------------------------
    // 狀態管理 
    // ----------------------------------------------------------------------
    let state = {
      screen: 'home',
      level: 1,
      questions: [],
      qIndex: 0,
      step: 1,
      inputs: { a: '', b: '', ans: '' },
      activeField: 'a',
      cursorPos: null, // 記錄游標位置，null表示在字串最尾端
      feedback: { message: '', type: '', showColoredHint: false, showIntermediate: false, praise: '' },
      score: 0,
      attempts: 0
    };

    // 鍵盤新增了 ⬅️ 和 ➡️，並調整為 5 行
    const keyboardKeys = [
      ['1', '2', '3', 'x', 'y'],
      ['4', '5', '6', 'm', 'n'],
      ['7', '8', '9', '+', '-'],
      ['0', '^2', '⬅️', '➡️', '⌫'],
      ['C', '確定']
    ];

    // ----------------------------------------------------------------------
    // 邏輯函數
    // ----------------------------------------------------------------------
    const startGame = (lvl) => {
      state.level = lvl;
      if (lvl === 1) state.questions = generateLevel1();
      else if (lvl === 2) state.questions = generateLevel2();
      else state.questions = generateLevel3();
      
      state.qIndex = 0;
      state.step = 1;
      state.inputs = { a: '', b: '', ans: '' };
      state.activeField = 'a';
      state.cursorPos = null;
      state.score = 0;
      state.attempts = 0;
      state.feedback = { message: '', type: '' };
      state.screen = 'game';
      renderApp();
    };

    const goHome = () => {
      state.screen = 'home';
      renderApp();
    };

    const handleKeyPress = (key) => {
      if (state.step === 3) return; // 鎖定鍵盤
      
      let str = state.inputs[state.activeField] || '';
      let pos = state.cursorPos !== null ? state.cursorPos : str.length;

      if (key === '⌫') {
        if (pos > 0) {
          // 如果前面是 ^2，要一次刪除兩個字元
          if (pos >= 2 && str.substring(pos - 2, pos) === '^2') {
            state.inputs[state.activeField] = str.slice(0, pos - 2) + str.slice(pos);
            state.cursorPos = pos - 2;
          } else {
            state.inputs[state.activeField] = str.slice(0, pos - 1) + str.slice(pos);
            state.cursorPos = pos - 1;
          }
        }
      } else if (key === 'C') {
        state.inputs[state.activeField] = '';
        state.cursorPos = 0;
      } else if (key === '確定') {
        if (state.step === 1) checkStep1();
        else checkStep2();
        return; 
      } else if (key === '⬅️') {
        if (pos > 0) {
          if (pos >= 2 && str.substring(pos - 2, pos) === '^2') state.cursorPos = pos - 2;
          else state.cursorPos = pos - 1;
        }
      } else if (key === '➡️') {
        if (pos < str.length) {
          if (str.substring(pos, pos + 2) === '^2') state.cursorPos = pos + 2;
          else state.cursorPos = pos + 1;
        }
      } else {
        // 在光標位置插入字元
        state.inputs[state.activeField] = str.slice(0, pos) + key + str.slice(pos);
        state.cursorPos = pos + key.length;
      }
      
      // 移動光標不清除提示，但修改內容會清除之前的錯誤提示
      if (key !== '⬅️' && key !== '➡️') {
        state.feedback = { message: '', type: '' };
      }
      renderApp();
    };

    const checkStep1 = () => {
      if (!state.inputs.a || !state.inputs.b) {
        state.feedback = { message: '請填寫 a 和 b 的數值！', type: 'error' };
        renderApp();
        return;
      }

      const q = state.questions[state.qIndex];
      const cleanA = state.inputs.a.replace(/\s+/g, '');
      const cleanB = state.inputs.b.replace(/\s+/g, '');
      const isACorrect = q.a.includes(cleanA);
      const isBCorrect = q.b.includes(cleanB);

      if (isACorrect && isBCorrect) {
        state.step = 2;
        state.activeField = 'ans';
        state.cursorPos = null;
        state.feedback = { message: '正確！請輸入展開後的答案。', type: 'success' };
        state.attempts = 0;
      } else {
        state.attempts++;
        if (state.attempts >= 2) {
          state.feedback = { message: 'a 或 b 的數值還是不太對喔。請看尋找秘訣並自己輸入一次：', type: 'warning', showColoredHint: true };
        } else {
          state.feedback = { message: 'a 或 b 的數值不正確，請再試一次！', type: 'error' };
        }
      }
      renderApp(); 
    };

    const checkStep2 = () => {
      if (!state.inputs.ans) {
        state.feedback = { message: '請填寫答案！', type: 'error' };
        renderApp(); 
        return;
      }

      const q = state.questions[state.qIndex];
      const cleanAns = state.inputs.ans.replace(/\s+/g, '');
      const isAnsCorrect = q.ans.includes(cleanAns);

      if (isAnsCorrect) {
        state.score++;
        const praises = ["太棒了！", "做得好！", "完美！", "你真聰明！", "數學小天才！"];
        state.feedback = { 
          message: '完全正確！', 
          type: 'success', 
          praise: praises[Math.floor(Math.random() * praises.length)] 
        };
        state.step = 3; 
        state.cursorPos = null;
      } else {
        state.attempts++;
        if (state.attempts >= 2) {
          state.feedback = { message: `試試看利用提示的步驟，自己計算出最終結果：`, type: 'info', showIntermediate: true };
        } else {
          state.feedback = { message: '答案不對，請再檢查一下正負號或平方！', type: 'error' };
        }
      }
      renderApp(); 
    };

    const nextQuestion = () => {
      if (state.qIndex < 9) {
        state.qIndex++;
        state.step = 1;
        state.inputs = { a: '', b: '', ans: '' };
        state.activeField = 'a';
        state.cursorPos = null;
        state.feedback = { message: '', type: '' };
        state.attempts = 0;
        renderApp();
      } else {
        state.screen = 'result';
        renderApp();
      }
    };

    const setActiveField = (field, pos) => {
      let newPos = pos !== null && pos !== undefined ? parseInt(pos, 10) : state.inputs[field].length;
      if (isNaN(newPos)) newPos = state.inputs[field].length;

      if (state.step === 1 && (field === 'a' || field === 'b')) {
        state.activeField = field;
        state.cursorPos = newPos;
        renderApp();
      } else if (state.step === 2 && field === 'ans') {
        state.activeField = field;
        state.cursorPos = newPos;
        renderApp();
      }
    };

    // ----------------------------------------------------------------------
    // 渲染輔助函數
    // ----------------------------------------------------------------------
    // 純文字渲染 (用於不需編輯的顯示區塊，如提示和題目)
    const renderMath = (str) => {
      if (!str) return '<span></span>';
      const parts = str.split('^2');
      let html = '<span class="font-mono tracking-wider">';
      parts.forEach((part, index) => {
        html += part;
        if (index < parts.length - 1) {
          html += '<sup class="text-[0.6em] relative -top-2">2</sup>';
        }
      });
      html += '</span>';
      return html;
    };

    // 互動式渲染 (包含光標、支援點擊定位)
    const renderMathInteractive = (str, fieldName, isActive) => {
      let pos = state.cursorPos;
      if (!isActive || pos === null || pos === undefined) pos = str.length;

      let html = `<div class="font-mono tracking-wider flex items-center h-full whitespace-nowrap">`;
      
      let i = 0;
      // 渲染位置 0 的點擊區塊與光標
      html += `<div data-action="set-field" data-field="${fieldName}" data-pos="0" class="h-full flex items-center cursor-text px-[4px] relative">
                  ${isActive && pos === 0 ? '<div class="absolute w-[2px] h-[70%] bg-blue-500 animate-pulse right-0 z-10"></div>' : ''}
               </div>`;

      // 逐字元/token 渲染
      while(i < str.length) {
         let isPow = str.substring(i, i+2) === '^2';
         let tokenText = isPow ? '<sup class="text-[0.6em] relative -top-2 pointer-events-none">2</sup>' : str[i];
         let tokenLen = isPow ? 2 : 1;
         i += tokenLen;
         
         html += `<div data-action="set-field" data-field="${fieldName}" data-pos="${i}" class="h-full flex items-center cursor-text relative group">
                     <span class="px-[1px] group-hover:text-blue-500 transition-colors">${tokenText}</span>
                     ${isActive && pos === i ? '<div class="w-[2px] h-[70%] bg-blue-500 animate-pulse absolute right-0 z-10"></div>' : ''}
                  </div>`;
      }
      html += `</div>`;
      return html;
    }

    // ----------------------------------------------------------------------
    // UI 渲染模板
    // ----------------------------------------------------------------------
    const renderHome = () => `
      <div class="min-h-screen bg-green-50 flex flex-col items-center justify-center p-8">
        <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-10 text-center border-4 border-green-200">
          <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-6">完全平方的展開</h1>
          
          <div class="bg-yellow-100 rounded-2xl p-6 mb-10 shadow-inner">
            <p class="text-gray-600 mb-4 font-medium text-lg">請緊記恆等式公式：</p>
            <div class="text-3xl md:text-4xl font-bold text-blue-700 space-y-4">
              <div>${renderMath("(a + b)^2 ≡ a^2 + 2ab + b^2")}</div>
              <div>${renderMath("(a - b)^2 ≡ a^2 - 2ab + b^2")}</div>
            </div>
          </div>

          <div class="space-y-4 flex flex-col items-center">
            <button data-action="start" data-level="1" class="w-full max-w-md bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-2xl shadow-lg transition-transform transform hover:scale-105 active:scale-95">
              等級一 (初階)
            </button>
            <button data-action="start" data-level="2" class="w-full max-w-md bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-full text-2xl shadow-lg transition-transform transform hover:scale-105 active:scale-95">
              等級二 (進階)
            </button>
            <button data-action="start" data-level="3" class="w-full max-w-md bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-full text-2xl shadow-lg transition-transform transform hover:scale-105 active:scale-95">
              等級三 (挑戰)
            </button>
          </div>
        </div>
      </div>
    `;

    const renderResult = () => `
      <div class="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-8">
        <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl p-10 text-center">
          <h1 class="text-4xl font-bold text-gray-800 mb-6">遊戲完成！</h1>
          <div class="text-8xl mb-6">${state.score >= 8 ? '🌟' : state.score >= 5 ? '👍' : '💪'}</div>
          <p class="text-2xl text-gray-600 mb-8">
            你的得分： <span class="text-4xl font-bold text-blue-600">${state.score}</span> / 10
          </p>
          <button data-action="home" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg transition-all active:scale-95">
            返回主畫面
          </button>
        </div>
      </div>
    `;

    const renderGame = () => {
      const currentQ = state.questions[state.qIndex];
      
      let feedbackHTML = '';
      if (state.feedback.message) {
        let fbClasses = 'p-4 rounded-xl text-lg font-bold text-center border-2 shrink-0 transition-colors flex flex-col items-center ';
        if (state.feedback.type === 'error') fbClasses += 'bg-red-50 text-red-600 border-red-200';
        else if (state.feedback.type === 'success') fbClasses += 'bg-green-50 text-green-600 border-green-200';
        else if (state.feedback.type === 'warning') fbClasses += 'bg-yellow-50 text-yellow-700 border-yellow-300';
        else fbClasses += 'bg-blue-50 text-blue-600 border-blue-200';

        let extraHints = '';
        if (state.feedback.showColoredHint) {
          extraHints = `
            <div class="mt-4 bg-white p-5 rounded-xl inline-block shadow-sm border-2 border-blue-200 text-left w-full max-w-md">
              <div class="text-gray-700 mb-3 font-bold text-center text-xl border-b pb-2">💡 尋找 a 和 b 的秘訣</div>
              <div class="text-gray-600 text-lg space-y-3">
                <p>👉 括號內的<span class="text-blue-600 font-bold">第一項</span>（包含正負號）是 <span class="font-serif italic font-bold text-blue-600">a</span></p>
                <p>👉 括號內的<span class="text-green-600 font-bold">第二項</span>（<span class="underline">不計</span>中間的加減號）是 <span class="font-serif italic font-bold text-green-600">b</span></p>
              </div>
            </div>`;
        }
        if (state.feedback.showIntermediate) {
          extraHints += `
            <div class="mt-4 bg-white p-5 rounded-xl inline-block shadow-sm border-2 border-purple-200 text-left w-full max-w-md">
               <div class="text-gray-700 mb-3 font-bold text-center text-xl border-b pb-2">💡 展開公式提示</div>
               <div class="flex flex-col gap-3 font-mono text-gray-800 text-2xl bg-purple-50 p-4 rounded-lg overflow-x-auto scrollbar-hide">
                 <div class="whitespace-nowrap">${renderMath(currentQ.text)}</div>
                 <div class="whitespace-nowrap text-purple-700 font-bold ml-4">${renderMath(`= ${currentQ.intermediate}`)}</div>
                 <div class="whitespace-nowrap text-purple-700 font-bold ml-4 flex items-center gap-2">
                   = <span class="inline-block w-16 border-b-2 border-purple-700 border-dashed"></span>
                 </div>
               </div>
            </div>`;
        }

        feedbackHTML = `<div class="${fbClasses}"><div>${state.feedback.message}</div>${extraHints}</div>`;
      }

      // Step 1 UI
      const step1Class = state.step === 1 ? 'border-blue-400 ring-4 ring-blue-100' : 'border-gray-200 opacity-60';
      const aFieldClass = state.activeField === 'a' ? 'border-blue-500 bg-blue-50 shadow-inner' : 'border-gray-300 bg-gray-50';
      const bFieldClass = state.activeField === 'b' ? 'border-blue-500 bg-blue-50 shadow-inner' : 'border-gray-300 bg-gray-50';
      
      let step1BtnHTML = '';
      if (state.step === 1) {
        step1BtnHTML = `<button data-action="check1" class="ml-auto bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow active:scale-95">檢查</button>`;
      }

      // Step 2 UI
      let step2HTML = '';
      if (state.step >= 2) {
        const step2Class = state.step === 2 ? 'border-purple-400 ring-4 ring-purple-100' : 'border-gray-200 opacity-80';
        const ansFieldClass = state.step === 3 ? 'border-green-400 bg-green-50' : 
                              state.activeField === 'ans' ? 'border-purple-500 bg-purple-50 shadow-inner cursor-pointer' : 'border-gray-300 bg-gray-50 cursor-pointer';
        
        let step2BtnHTML = '';
        if (state.step !== 3) {
          step2BtnHTML = `<button data-action="check2" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-xl shadow active:scale-95 text-xl shrink-0 transition-transform">提交</button>`;
        } else {
          step2BtnHTML = `<div class="bg-green-500 text-white font-bold py-4 px-8 rounded-xl shadow text-xl shrink-0 flex items-center gap-2"><span>✓</span> 正確</div>`;
        }

        step2HTML = `
          <div class="bg-white rounded-3xl shadow-lg p-6 border-2 shrink-0 transition-all ${step2Class}">
            <h3 class="text-xl font-bold text-gray-700 mb-4 flex items-center">
              <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3">2</span>
              計算 a² ± 2ab + b²，寫出最終答案
            </h3>
            <div class="flex items-center justify-center gap-4">
              <span class="text-3xl font-bold text-gray-600">答案 = </span>
              <div data-action="set-field" data-field="ans" class="flex-1 max-w-md h-16 rounded-xl border-2 flex items-center justify-center text-3xl font-mono overflow-x-auto scrollbar-hide transition-colors ${ansFieldClass}">
                ${renderMathInteractive(state.inputs.ans, 'ans', state.step === 2 && state.activeField === 'ans')}
              </div>
              ${step2BtnHTML}
            </div>
          </div>
        `;
      }

      // Keyboard UI
      const keyboardHTML = keyboardKeys.map(row => `
        <div class="flex gap-2 lg:gap-3 justify-center">
          ${row.map(key => {
            let btnClass = "flex-1 h-14 md:h-16 bg-white rounded-2xl shadow shadow-gray-400 flex items-center justify-center text-2xl font-bold text-gray-800 active:bg-gray-100 active:scale-95 transition-all select-none";
            
            if (key === '確定') btnClass = "flex-[3] h-14 md:h-16 bg-green-500 text-white rounded-2xl shadow shadow-green-700 flex items-center justify-center text-xl font-bold active:bg-green-600 active:scale-95 transition-all select-none";
            else if (key === 'C') btnClass = "flex-[2] h-14 md:h-16 bg-red-100 text-red-600 rounded-2xl shadow shadow-red-300 flex items-center justify-center text-2xl font-bold active:bg-red-200 active:scale-95 transition-all select-none";
            else if (key === '⌫') btnClass = "flex-1 h-14 md:h-16 bg-red-100 text-red-600 rounded-2xl shadow shadow-red-300 flex items-center justify-center text-2xl font-bold active:bg-red-200 active:scale-95 transition-all select-none";
            else if (key === '^2') btnClass = "flex-1 h-14 md:h-16 bg-blue-100 text-blue-800 rounded-2xl shadow shadow-blue-300 flex items-center justify-center text-2xl font-bold font-mono active:bg-blue-200 active:scale-95 transition-all select-none";
            else if (['⬅️', '➡️'].includes(key)) btnClass = "flex-1 h-14 md:h-16 bg-gray-300 text-gray-800 rounded-2xl shadow shadow-gray-500 flex items-center justify-center text-2xl font-bold active:bg-gray-400 active:scale-95 transition-all select-none";
            else if (['+', '-', 'x', 'y', 'm', 'n'].includes(key)) btnClass = "flex-1 h-14 md:h-16 bg-gray-100 text-gray-800 rounded-2xl shadow shadow-gray-400 flex items-center justify-center text-2xl font-bold font-mono active:bg-gray-200 active:scale-95 transition-all select-none";

            let displayKey = key === '^2' ? '<span><span class="opacity-0">.</span><sup>2</sup></span>' : key;
            return `<button data-action="key" data-key="${key}" class="${btnClass}" style="touch-action: manipulation;">${displayKey}</button>`;
          }).join('')}
        </div>
      `).join('');

      let successOverlay = '';
      if (state.step === 3) {
        successOverlay = `
          <div class="absolute bottom-8 left-6 right-6 bg-white p-6 rounded-2xl shadow-2xl border-4 border-yellow-400 flex flex-col items-center z-20">
            <p class="text-3xl font-bold text-orange-500 mb-6 flex items-center gap-2">
              🌟 ${state.feedback.praise} 🌟
            </p>
            <button data-action="next" class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-4 px-8 rounded-xl shadow-md active:scale-95 text-2xl transition-all">
              下一題 ➡️
            </button>
          </div>
        `;
      }

      return `
        <div class="min-h-screen bg-slate-100 flex flex-col font-sans h-screen overflow-hidden">
          <!-- 頂部導航 -->
          <div class="bg-white shadow-md px-6 py-4 flex justify-between items-center z-10 shrink-0">
            <button data-action="home" class="text-gray-500 hover:text-gray-800 font-bold px-4 py-2 bg-gray-100 rounded-lg active:scale-95">
              放棄並返回
            </button>
            <h2 class="text-2xl font-bold text-gray-800">
              等級 ${state.level} <span class="text-gray-400 mx-2">|</span> 第 ${state.qIndex + 1} / 10 題
            </h2>
            <div class="text-xl font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg">
              得分: ${state.score}
            </div>
          </div>

          <!-- 主要內容區 (左右分欄) -->
          <div class="flex-1 flex flex-row p-6 gap-6 overflow-hidden">
            <!-- 左側：題目與輸入區 -->
            <div id="left-panel" class="w-3/5 flex flex-col gap-6 overflow-y-auto pr-2 pb-20">
              <div class="bg-white rounded-3xl shadow-lg p-8 flex flex-col items-center justify-center border-t-8 border-blue-400 shrink-0 max-w-full overflow-hidden">
                <p class="text-gray-500 font-bold text-lg mb-2">展開下列算式：</p>
                <div class="text-3xl md:text-4xl lg:text-5xl font-bold text-gray-800 py-4 whitespace-nowrap overflow-x-auto w-full text-center scrollbar-hide">
                  ${renderMath(currentQ.text)}
                </div>
              </div>

              ${feedbackHTML}

              <div class="bg-white rounded-3xl shadow-lg p-6 border-2 transition-all shrink-0 ${step1Class}">
                <h3 class="text-xl font-bold text-gray-700 mb-4 flex items-center">
                  <span class="bg-blue-100 text-blue-700 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3">1</span>
                  根據 (a±b)² = a²±2ab+b²，找出 a 和 b
                </h3>
                <div class="flex flex-col sm:flex-row gap-4 items-center justify-center">
                  <div class="flex items-center text-3xl">
                    <span class="font-serif italic mr-3">a = </span>
                    <div data-action="set-field" data-field="a" class="w-32 h-14 rounded-xl border-2 flex items-center justify-center text-2xl font-mono cursor-pointer transition-all overflow-x-auto scrollbar-hide ${aFieldClass}">
                      ${renderMathInteractive(state.inputs.a, 'a', state.step === 1 && state.activeField === 'a')}
                    </div>
                  </div>
                  <div class="flex items-center text-3xl">
                    <span class="font-serif italic mr-3 ml-4">b = </span>
                    <div data-action="set-field" data-field="b" class="w-32 h-14 rounded-xl border-2 flex items-center justify-center text-2xl font-mono cursor-pointer transition-all overflow-x-auto scrollbar-hide ${bFieldClass}">
                      ${renderMathInteractive(state.inputs.b, 'b', state.step === 1 && state.activeField === 'b')}
                    </div>
                  </div>
                  ${step1BtnHTML}
                </div>
              </div>

              ${step2HTML}
            </div>

            <!-- 右側：專屬數學鍵盤 -->
            <div class="w-2/5 flex flex-col bg-gray-200 rounded-3xl p-4 shadow-inner shrink-0 relative">
              <div class="text-center mb-4 text-gray-500 font-bold">自定義數學鍵盤</div>
              <div class="flex flex-col gap-2 lg:gap-3 transition-opacity duration-300 ${state.step === 3 ? 'opacity-30 pointer-events-none' : ''}">
                ${keyboardHTML}
              </div>
              ${successOverlay}
            </div>
          </div>
        </div>
      `;
    };

    // ----------------------------------------------------------------------
    // 渲染控制器與事件委派
    // ----------------------------------------------------------------------
    const renderApp = () => {
      const app = document.getElementById('app');
      
      const leftPanel = document.getElementById('left-panel');
      const savedScrollTop = leftPanel ? leftPanel.scrollTop : 0;

      if (state.screen === 'home') app.innerHTML = renderHome();
      else if (state.screen === 'game') app.innerHTML = renderGame();
      else if (state.screen === 'result') app.innerHTML = renderResult();

      const newLeftPanel = document.getElementById('left-panel');
      if (newLeftPanel) {
        newLeftPanel.scrollTop = savedScrollTop;
      }
    };

    document.getElementById('app').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const action = btn.getAttribute('data-action');
      if (action === 'start') startGame(parseInt(btn.getAttribute('data-level')));
      else if (action === 'home') goHome();
      else if (action === 'key') handleKeyPress(btn.getAttribute('data-key'));
      else if (action === 'check1') checkStep1();
      else if (action === 'check2') checkStep2();
      else if (action === 'next') nextQuestion();
      else if (action === 'set-field') setActiveField(btn.getAttribute('data-field'), btn.getAttribute('data-pos'));
    });

    // 初始化應用程式
    renderApp();
  </script>
</body>
</html>
