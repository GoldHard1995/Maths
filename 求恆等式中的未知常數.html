<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>жҒҶзӯүејҸ</title>
    <!-- еј•е…Ҙ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- еј•е…Ҙ Lucide ең–жЁҷеә« -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* йҡұи—Ҹж»ҫеӢ•жўқдҪҶе…ҒиЁұж»ҫеӢ• */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
            overscroll-behavior: none; /* йҳІжӯў Safari зҡ„ж©Ўзҡ®зӯӢж•Ҳжһң */
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 overflow-hidden">
    <div id="app" class="w-full h-[100dvh]"></div>

    <script>
        // --- жҮүз”ЁзЁӢејҸзӢҖж…Ӣ ---
        const appState = {
            gameState: 'HOME', // HOME, PLAYING, RESULT
            level: 1,
            questions: [],
            currentIndex: 0,
            score: 0,
            inputs: { A: '', B: '', C: '' },
            activeInput: 'A',
            feedback: null // 'correct', 'wrong', null
        };

        // --- е·Ҙе…·зө„д»¶пјҡеҪ©иүІж–Үеӯ—иҪү HTML ---
        const colorTextToHTML = (text) => {
            if (!text) return '';
            const formatBr = (str) => str.replace(/\n/g, '<br />');
            const parts = text.split(/(<[rbg]>.*?<\/[rbg]>)/g);
            return parts.map((part) => {
                if (part.startsWith('<r>')) return `<span class="text-red-500 font-bold leading-relaxed">${formatBr(part.replace(/<r>|<\/r>/g, ''))}</span>`;
                if (part.startsWith('<b>')) return `<span class="text-blue-600 font-bold leading-relaxed">${formatBr(part.replace(/<b>|<\/b>/g, ''))}</span>`;
                if (part.startsWith('<g>')) return `<span class="text-green-600 font-bold leading-relaxed">${formatBr(part.replace(/<g>|<\/g>/g, ''))}</span>`;
                return `<span class="leading-relaxed">${formatBr(part)}</span>`;
            }).join('');
        };

        // --- е·Ҙе…·еҮҪж•ё ---
        const randInt = (min, max) => {
            let val = 0;
            while (val === 0) {
                val = Math.floor(Math.random() * (max - min + 1)) + min;
            }
            return val;
        };

        const formatExpr = (terms) => {
            let str = '';
            terms.forEach((t, i) => {
                const isFirst = i === 0;
                if (t.isVar) {
                    let vStr = String(t.val);
                    if (vStr.startsWith('-')) {
                        str += (isFirst ? '-' : ' - ') + vStr.substring(1) + t.type;
                    } else {
                        str += (isFirst ? '' : ' + ') + vStr + t.type;
                    }
                } else {
                    let c = t.val;
                    let absC = Math.abs(c);
                    if (isFirst) {
                        str += c < 0 ? '-' : '';
                    } else {
                        str += c < 0 ? ' - ' : ' + ';
                    }
                    if (t.type === '') str += absC;
                    else {
                        if (absC !== 1) str += absC;
                        str += t.type;
                    }
                }
            });
            return str;
        };

        const fmtTerm = (c, t, isFirst, tag) => {
            let sign = isFirst ? '' : ' + ';
            let v = c;
            if (typeof c === 'number') {
                if (c < 0) { sign = isFirst ? '-' : ' - '; v = Math.abs(c); }
                if (v === 1 && t !== '') v = '';
            } else if (typeof c === 'string' && c.startsWith('-')) {
                sign = isFirst ? '-' : ' - '; v = c.substring(1);
            }
            let str = `${v}${t}`;
            return `${sign}<${tag}>${str}</${tag}>`;
        };

        // --- йЎҢзӣ®з”ҹжҲҗеҷЁ ---
        const generateLevel1 = () => {
            const A = randInt(-9, 9), B = randInt(-9, 9), C = randInt(-9, 9);
            const types = ['xВІ', 'x', ''];
            let lhsTerms = [], rhsTerms = [];
            const vars = ['A', 'B', 'C'], vals = [A, B, C];

            for (let i = 0; i < 3; i++) {
                if (Math.random() > 0.5) {
                    lhsTerms.push({ val: vars[i], isVar: true, type: types[i] });
                    rhsTerms.push({ val: vals[i], isVar: false, type: types[i] });
                } else {
                    lhsTerms.push({ val: vals[i], isVar: false, type: types[i] });
                    rhsTerms.push({ val: vars[i], isVar: true, type: types[i] });
                }
            }

            lhsTerms.sort(() => Math.random() - 0.5);
            rhsTerms.sort(() => Math.random() - 0.5);

            const sortedLhs = [...lhsTerms].sort((a,b) => (a.type === 'xВІ' ? -1 : a.type === '' ? 1 : (b.type === 'xВІ' ? 1 : -1)));
            const sortedRhs = [...rhsTerms].sort((a,b) => (a.type === 'xВІ' ? -1 : a.type === '' ? 1 : (b.type === 'xВІ' ? 1 : -1)));

            const formatWithTags = (terms) => terms.map((t, i) => fmtTerm(t.val, t.type, i === 0, t.type === 'xВІ' ? 'r' : t.type === 'x' ? 'b' : 'g')).join('');

            return {
                lhs: formatExpr(lhsTerms),
                rhs: formatExpr(rhsTerms),
                ans: { A, B, C },
                req: ['A', 'B', 'C'],
                expLhs: formatWithTags(sortedLhs),
                expRhs: formatWithTags(sortedRhs),
                steps: vars.map(v => {
                    let type = '';
                    for (let t of lhsTerms) if(t.isVar && t.val === v) type = t.type;
                    for (let t of rhsTerms) if(t.isVar && t.val === v) type = t.type;
                    let tag = type === 'xВІ' ? 'r' : type === 'x' ? 'b' : 'g';
                    let label = type === 'xВІ' ? 'xВІ й …' : type === 'x' ? 'x й …' : 'еёёж•ёй …';
                    return `<${tag}>жҜ”ијғ ${label}пјҡ\n${v} = ${vals[vars.indexOf(v)]}</${tag}>`;
                })
            };
        };

        const generateLevel2 = () => {
            const t = Math.floor(Math.random() * 5); // еўһеҠ еҲ°дәҶ 5 зЁ®йЎҢеһӢ
            let n1 = randInt(-5, 5), n2 = randInt(-5, 5);
            let ans = {}, req = ['A', 'B'], lhs = '', rhs = '', expLhs = '', expRhs = '', steps = [];

            if (t === 0) {
                ans.A = n1; ans.B = n1 * n2;
                lhs = `${n1 === 1 ? '' : n1 === -1 ? '-' : n1}(${n2} + x)`;
                rhs = `Ax + B`;
                expLhs = fmtTerm(n1, 'x', true, 'b') + fmtTerm(n1*n2, '', false, 'g');
                expRhs = fmtTerm('A', 'x', true, 'b') + fmtTerm('B', '', false, 'g');
                steps = [`<b>жҜ”ијғ x й …пјҡ\nA = ${n1}</b>`, `<g>жҜ”ијғеёёж•ёй …пјҡ\nB = ${n1*n2}</g>`];
            } else if (t === 1) {
                ans.B = randInt(-5, 5); ans.A = n2; n1 = n2 * ans.B;
                lhs = `AxВІ ${n1 < 0 ? '-' : '+'} ${Math.abs(n1)}x`;
                rhs = `${n2 === 1 ? '' : n2 === -1 ? '-' : n2}x(x + B)`;
                expLhs = fmtTerm('A', 'xВІ', true, 'r') + fmtTerm(n1, 'x', false, 'b');
                expRhs = fmtTerm(n2, 'xВІ', true, 'r') + fmtTerm(`${n2 === 1 ? '' : n2 === -1 ? '-' : n2}B`, 'x', false, 'b');
                steps = [`<r>жҜ”ијғ xВІ й …пјҡ\nA = ${n2}</r>`, `<b>жҜ”ијғ x й …пјҡ\n${n1} = ${n2 === 1 ? '' : n2 === -1 ? '-' : n2}B\nB = ${ans.B}</b>`];
            } else if (t === 2) {
                ans.A = randInt(-5, 5); ans.B = randInt(-9, 9);
                let n3 = n1 * ans.A, n4 = n1 * n2 + ans.B;
                lhs = `${n1 === 1 ? '' : n1 === -1 ? '-' : n1}(Ax ${n2 < 0 ? '-' : '+'} ${Math.abs(n2)}) + B`;
                rhs = `${n3 === 1 ? '' : n3 === -1 ? '-' : n3}x ${n4 < 0 ? '-' : '+'} ${Math.abs(n4)}`;
                expLhs = fmtTerm(`${n1 === 1 ? '' : n1 === -1 ? '-' : n1}A`, 'x', true, 'b') + fmtTerm(n1*n2, '', false, 'g') + fmtTerm('B', '', false, 'g');
                expRhs = fmtTerm(n3, 'x', true, 'b') + fmtTerm(n4, '', false, 'g');
                steps = [`<b>жҜ”ијғ x й …пјҡ\n${n1 === 1 ? '' : n1 === -1 ? '-' : n1}A = ${n3}\nA = ${ans.A}</b>`, `<g>жҜ”ијғеёёж•ёй …пјҡ\n${n1*n2} + B = ${n4}\nB = ${ans.B}</g>`];
            } else if (t === 3) {
                ans.A = randInt(-5, 5); let n3 = ans.A * n1; ans.B = ans.A * n2;
                lhs = `A(${n1 === 1 ? '' : n1 === -1 ? '-' : n1}x ${n2 < 0 ? '-' : '+'} ${Math.abs(n2)})`;
                rhs = `${n3 === 1 ? '' : n3 === -1 ? '-' : n3}x + B`;
                expLhs = fmtTerm(`${n1 === 1 ? '' : n1 === -1 ? '-' : n1}A`, 'x', true, 'b') + fmtTerm(`${n2 === 1 ? '' : n2 === -1 ? '-' : n2}A`, '', false, 'g');
                expRhs = fmtTerm(n3, 'x', true, 'b') + fmtTerm('B', '', false, 'g');
                steps = [`<b>жҜ”ијғ x й …пјҡ\n${n1 === 1 ? '' : n1 === -1 ? '-' : n1}A = ${n3}\nA = ${ans.A}</b>`, `<g>жҜ”ијғеёёж•ёй …пјҡ\n${n2 === 1 ? '' : n2 === -1 ? '-' : n2}A = B\nB = ${ans.B}</g>`];
            } else if (t === 4) {
                // ж–°еўһжүӢеҜ«йЎҢеһӢпјҡ2AxВІ + Bx + 3C вүЎ -9 + 5x + 8xВІ
                let c1 = randInt(-4, 4), c2 = randInt(-4, 4), c3 = randInt(-4, 4);
                ans.A = randInt(-5, 5); ans.B = randInt(-5, 5); ans.C = randInt(-5, 5);
                req = ['A', 'B', 'C']; // йҖҷйЎҢйңҖиҰҒжұӮдёүеҖӢжңӘзҹҘж•ё
                
                let n3 = c1 * ans.A, n4 = c2 * ans.B, n5 = c3 * ans.C;

                let lhsTerms = [
                    { val: (c1 === 1 ? '' : c1 === -1 ? '-' : c1) + 'A', isVar: true, type: 'xВІ' },
                    { val: (c2 === 1 ? '' : c2 === -1 ? '-' : c2) + 'B', isVar: true, type: 'x' },
                    { val: (c3 === 1 ? '' : c3 === -1 ? '-' : c3) + 'C', isVar: true, type: '' }
                ].sort(() => Math.random() - 0.5);

                let rhsTerms = [
                    { val: n3, isVar: false, type: 'xВІ' },
                    { val: n4, isVar: false, type: 'x' },
                    { val: n5, isVar: false, type: '' }
                ].sort(() => Math.random() - 0.5);

                lhs = formatExpr(lhsTerms);
                rhs = formatExpr(rhsTerms);

                expLhs = fmtTerm((c1 === 1 ? '' : c1 === -1 ? '-' : c1) + 'A', 'xВІ', true, 'r') + 
                         fmtTerm((c2 === 1 ? '' : c2 === -1 ? '-' : c2) + 'B', 'x', false, 'b') + 
                         fmtTerm((c3 === 1 ? '' : c3 === -1 ? '-' : c3) + 'C', '', false, 'g');
                expRhs = fmtTerm(n3, 'xВІ', true, 'r') + 
                         fmtTerm(n4, 'x', false, 'b') + 
                         fmtTerm(n5, '', false, 'g');

                steps = [
                    `<r>жҜ”ијғ xВІ й …пјҡ\n${c1 === 1 ? '' : c1 === -1 ? '-' : c1}A = ${n3}${c1 === 1 ? '' : '\nA = ' + ans.A}</r>`,
                    `<b>жҜ”ијғ x й …пјҡ\n${c2 === 1 ? '' : c2 === -1 ? '-' : c2}B = ${n4}${c2 === 1 ? '' : '\nB = ' + ans.B}</b>`,
                    `<g>жҜ”ијғеёёж•ёй …пјҡ\n${c3 === 1 ? '' : c3 === -1 ? '-' : c3}C = ${n5}${c3 === 1 ? '' : '\nC = ' + ans.C}</g>`
                ];
            }
            return { lhs, rhs, ans, req, expLhs, expRhs, steps };
        };

        const generateLevel3 = () => {
            const t = Math.floor(Math.random() * 2);
            let ans = {}, req = ['A', 'B', 'C'], lhs = '', rhs = '', expLhs = '', expRhs = '', steps = [];
            
            if (t === 0) {
                let n1 = randInt(-4, 4), n2 = randInt(-4, 4), n3 = randInt(-4, 4), n4 = randInt(-5, 5), n5 = randInt(-5, 5);
                ans.A = n1 * n3; ans.B = n1 * n2 + n5; ans.C = n4;
                lhs = `AxВІ + Bx + C`;
                rhs = `${n1 === 1 ? '' : n1 === -1 ? '-' : n1}x(${n2} ${n3 < 0 ? '-' : '+'} ${Math.abs(n3)}x) ${n4 < 0 ? '-' : '+'} ${Math.abs(n4)} ${n5 < 0 ? '-' : '+'} ${Math.abs(n5)}x`;
                expLhs = fmtTerm('A', 'xВІ', true, 'r') + fmtTerm('B', 'x', false, 'b') + fmtTerm('C', '', false, 'g');
                expRhs = fmtTerm(ans.A, 'xВІ', true, 'r') + fmtTerm(ans.B, 'x', false, 'b') + fmtTerm(ans.C, '', false, 'g');
                steps = [
                    `<r>жҜ”ијғ xВІ й …пјҡ\nA = ${n1} Г— ${n3}\nA = ${ans.A}</r>`,
                    `<b>жҜ”ијғ x й …пјҡ\nB = ${n1} Г— ${n2} ${n5 < 0 ? '-' : '+'} ${Math.abs(n5)}\nB = ${ans.B}</b>`,
                    `<g>жҜ”ијғеёёж•ёй …пјҡ\nC = ${ans.C}</g>`
                ];
            } else {
                let n2 = randInt(-4, 4), n3 = randInt(-4, 4), n4 = randInt(-5, 5), n5 = randInt(-5, 5);
                ans.A = n2 * n3; ans.B = randInt(-4, 4); let n1 = n2 * ans.B + n4; ans.C = -n5;
                lhs = `x(Ax ${n1 < 0 ? '-' : '+'} ${Math.abs(n1)})`;
                rhs = `${n2 === 1 ? '' : n2 === -1 ? '-' : n2}(${n3 === 1 ? '' : n3 === -1 ? '-' : n3}xВІ + Bx) ${n4 < 0 ? '-' : '+'} ${Math.abs(n4)}x ${n5 < 0 ? '-' : '+'} ${Math.abs(n5)} + C`;
                expLhs = fmtTerm('A', 'xВІ', true, 'r') + fmtTerm(n1, 'x', false, 'b');
                expRhs = fmtTerm(ans.A, 'xВІ', true, 'r') + fmtTerm(`${n2 === 1 ? '' : n2 === -1 ? '-' : n2}B`, 'x', false, 'b') + fmtTerm(n4, 'x', false, 'b') + fmtTerm(n5, '', false, 'g') + fmtTerm('C', '', false, 'g');
                steps = [
                    `<r>жҜ”ијғ xВІ й …пјҡ\nA = ${n2} Г— ${n3}\nA = ${ans.A}</r>`,
                    `<b>жҜ”ијғ x й …пјҡ\n${n1} = ${n2 === 1 ? '' : n2 === -1 ? '-' : n2}B ${n4 < 0 ? '-' : '+'} ${Math.abs(n4)}\n${n2 === 1 ? '' : n2 === -1 ? '-' : n2}B = ${n1 - n4}\nB = ${ans.B}</b>`,
                    `<g>жҜ”ијғеёёж•ёй …пјҡ\n0 = ${n5} + C\nC = ${ans.C}</g>`
                ];
            }
            return { lhs, rhs, ans, req, expLhs, expRhs, steps };
        };

        // --- жҺ§еҲ¶йӮҸијҜ ---
        window.startGame = (lvl) => {
            appState.level = lvl;
            let qs = [];
            for (let i = 0; i < 10; i++) {
                if (lvl === 1) qs.push(generateLevel1());
                else if (lvl === 2) qs.push(generateLevel2());
                else qs.push(generateLevel3());
            }
            appState.questions = qs;
            appState.currentIndex = 0;
            appState.score = 0;
            appState.inputs = { A: '', B: '', C: '' };
            appState.activeInput = qs[0].req[0];
            appState.gameState = 'PLAYING';
            appState.feedback = null;
            renderApp();
        };

        window.goHome = () => {
            appState.gameState = 'HOME';
            renderApp();
        };

        window.setActiveInput = (v) => {
            if (appState.feedback !== 'wrong') {
                appState.activeInput = v;
                renderApp();
            }
        };

        window.handleKeyPress = (key) => {
            if (appState.feedback !== null) return;
            
            let currentVal = appState.inputs[appState.activeInput];
            
            if (key === 'DEL') {
                appState.inputs[appState.activeInput] = currentVal.slice(0, -1);
            } else if (key === '-') {
                if (currentVal.startsWith('-')) {
                    appState.inputs[appState.activeInput] = currentVal.slice(1);
                } else {
                    appState.inputs[appState.activeInput] = '-' + currentVal;
                }
            } else if (currentVal.length < 4) {
                if (currentVal === '0') appState.inputs[appState.activeInput] = key;
                else if (currentVal === '-0') appState.inputs[appState.activeInput] = '-' + key;
                else appState.inputs[appState.activeInput] = currentVal + key;
            }
            renderApp();
        };

        window.checkAnswer = () => {
            const q = appState.questions[appState.currentIndex];
            for (let v of q.req) {
                if (appState.inputs[v] === '' || appState.inputs[v] === '-') return;
            }

            const isCorrect = q.req.every(v => parseInt(appState.inputs[v]) === q.ans[v]);

            if (isCorrect) {
                appState.feedback = 'correct';
                appState.score += 1;
                renderApp();
                setTimeout(() => {
                    nextQuestion();
                }, 1200);
            } else {
                appState.feedback = 'wrong';
                renderApp();
            }
        };

        window.nextQuestion = () => {
            if (appState.currentIndex < 9) {
                appState.inputs = { A: '', B: '', C: '' };
                appState.currentIndex += 1;
                appState.activeInput = appState.questions[appState.currentIndex].req[0];
                appState.feedback = null;
                renderApp();
            } else {
                appState.gameState = 'RESULT';
                renderApp();
            }
        };

        // --- жёІжҹ“з•«йқў ---
        const renderApp = () => {
            const app = document.getElementById('app');
            let html = '';

            if (appState.gameState === 'HOME') {
                html = `
                <div class="w-full h-[100dvh] bg-slate-100 flex flex-col items-center justify-center p-8 font-sans">
                    <div class="bg-white p-10 rounded-3xl shadow-xl max-w-2xl w-full text-center">
                        <div class="flex justify-center mb-6 text-blue-600"><i data-lucide="award" class="w-20 h-20"></i></div>
                        <h1 class="text-4xl md:text-5xl font-bold text-slate-800 mb-4 tracking-wider">жҒҶзӯүејҸ</h1>
                        <p class="text-xl text-slate-500 mb-10">жұӮжҒҶзӯүејҸдёӯзҡ„жңӘзҹҘеёёж•ё</p>
                        <div class="space-y-4 flex flex-col items-center">
                            <button onclick="startGame(1)" class="w-64 py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl text-2xl font-bold shadow-md transition-transform active:scale-95">зӯүзҙҡ дёҖ</button>
                            <button onclick="startGame(2)" class="w-64 py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-2xl font-bold shadow-md transition-transform active:scale-95">зӯүзҙҡ дәҢ</button>
                            <button onclick="startGame(3)" class="w-64 py-4 bg-purple-500 hover:bg-purple-600 text-white rounded-2xl text-2xl font-bold shadow-md transition-transform active:scale-95">зӯүзҙҡ дёү</button>
                        </div>
                    </div>
                </div>`;
            } else if (appState.gameState === 'RESULT') {
                const emoji = appState.score >= 8 ? 'рҹҢҹ' : appState.score >= 5 ? 'рҹ‘Қ' : 'рҹ’Ә';
                const scoreColor = appState.score >= 5 ? 'text-green-500' : 'text-orange-500';
                
                html = `
                <div class="w-full h-[100dvh] bg-slate-100 flex flex-col items-center justify-center p-8 font-sans">
                    <div class="bg-white p-12 rounded-3xl shadow-xl max-w-xl w-full text-center">
                        <h2 class="text-5xl font-bold text-slate-800 mb-6">е®ҢжҲҗжҢ‘жҲ°пјҒ</h2>
                        <div class="text-8xl mb-8">${emoji}</div>
                        <p class="text-3xl text-slate-600 mb-10">дҪ зҡ„еҫ—еҲҶпјҡ <span class="font-bold ${scoreColor}">${appState.score} / 10</span></p>
                        <button onclick="goHome()" class="flex items-center justify-center mx-auto space-x-2 px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-2xl font-bold shadow-md transition-transform active:scale-95">
                            <i data-lucide="home" class="w-7 h-7"></i><span>иҝ”еӣһдё»й Ғ</span>
                        </button>
                    </div>
                </div>`;
            } else if (appState.gameState === 'PLAYING') {
                const q = appState.questions[appState.currentIndex];

                // ж§Ӣе»әијёе…ҘжЎҶ HTML
                const inputBoxesHtml = ['A', 'B', 'C'].map(v => {
                    if (!q.req.includes(v)) return '';
                    
                    const isActive = appState.activeInput === v && appState.feedback !== 'wrong';
                    const isSubmitted = appState.feedback === 'wrong';
                    const isCorrectInput = isSubmitted && parseInt(appState.inputs[v]) === q.ans[v];
                    const isWrongInput = isSubmitted && parseInt(appState.inputs[v]) !== q.ans[v];

                    let containerClass = 'border-transparent bg-slate-100 hover:bg-slate-200';
                    if (isActive) containerClass = 'border-blue-500 bg-blue-50 shadow-lg scale-105';
                    else if (isCorrectInput) containerClass = 'border-green-500 bg-green-50';
                    else if (isWrongInput) containerClass = 'border-red-500 bg-red-50';

                    let textClass = 'text-slate-800';
                    if (isWrongInput) textClass = 'text-red-700';
                    else if (isCorrectInput) textClass = 'text-green-700';

                    let boxClass = 'border-slate-300 text-slate-700';
                    if (isActive) boxClass = 'border-blue-400 text-blue-700';
                    else if (isCorrectInput) boxClass = 'border-green-400 text-green-700';
                    else if (isWrongInput) boxClass = 'border-red-400 text-red-700';

                    const valDisplay = appState.inputs[v] !== '' ? appState.inputs[v] : `<span class="text-slate-300">?</span>`;

                    return `
                    <div onclick="setActiveInput('${v}')" class="flex items-center space-x-2 md:space-x-4 cursor-pointer p-3 md:p-4 rounded-2xl transition-all border-4 ${containerClass}">
                        <span class="text-3xl lg:text-4xl font-bold font-sans ${textClass}">${v}</span>
                        <span class="text-3xl lg:text-4xl font-bold font-sans ${textClass}">=</span>
                        <div class="w-24 h-16 md:w-28 md:h-20 bg-white rounded-xl flex items-center justify-center text-3xl lg:text-4xl font-bold font-sans border-2 ${boxClass}">
                            ${valDisplay}
                        </div>
                    </div>`;
                }).join('');

                // ж§Ӣе»әеҸіеҒҙйқўжқҝ (йҢҜиӘӨжҸҗзӨә жҲ– ж•ёеӯ—йҚөзӣӨ)
                let rightPanelHtml = '';
                if (appState.feedback === 'wrong') {
                    const correctAnswersHtml = q.req.map(v => `
                        <div class="bg-green-50 px-4 md:px-5 py-2 md:py-3 rounded-xl border-2 border-green-200">
                            <span class="text-2xl md:text-3xl font-bold text-green-700">${v} = ${q.ans[v]}</span>
                        </div>
                    `).join('');

                    const stepsHtml = q.steps.map(step => `
                        <li class="text-base md:text-lg lg:text-xl bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200 shadow-sm block">
                            ${colorTextToHTML(step)}
                        </li>
                    `).join('');

                    rightPanelHtml = `
                    <div class="w-full md:w-[320px] lg:w-[380px] bg-white rounded-3xl shadow-xl flex flex-col p-4 md:p-5 shrink-0 border-4 border-red-400 overflow-hidden">
                        <h3 class="text-2xl md:text-3xl font-bold text-red-500 mb-4 flex items-center shrink-0">
                            <i data-lucide="x" class="mr-2 w-8 h-8 stroke-[3]"></i> зӯ”йҢҜдәҶпјҒ
                        </h3>
                        <div class="flex-1 overflow-y-auto pr-2 pb-4 space-y-4 md:space-y-5">
                            <div>
                                <p class="text-lg md:text-xl font-bold text-slate-500 mb-2 md:mb-3">жӯЈзўәи§Јзӯ”пјҡ</p>
                                <div class="flex flex-wrap gap-3 md:gap-4">${correctAnswersHtml}</div>
                            </div>
                            <div>
                                <p class="text-lg md:text-xl font-bold text-slate-500 mb-2 md:mb-3">и§ЈйЎҢжҸҗзӨәпјҡ</p>
                                <div class="bg-slate-50 p-3 md:p-4 rounded-2xl mb-3 md:mb-4 text-lg md:text-xl lg:text-2xl font-bold text-center border-2 border-slate-200 leading-relaxed shadow-sm">
                                    ${colorTextToHTML(`${q.expLhs} вүЎ ${q.expRhs}`)}
                                </div>
                                <ul class="space-y-2 md:space-y-3">${stepsHtml}</ul>
                            </div>
                        </div>
                        <button onclick="nextQuestion()" class="mt-2 py-3 md:py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-xl md:text-2xl font-bold w-full shrink-0 shadow-md active:scale-95 transition-all flex items-center justify-center space-x-2">
                            <span>дёӢдёҖйЎҢ</span><i data-lucide="arrow-right" class="w-6 h-6"></i>
                        </button>
                    </div>`;
                } else {
                    const numButtons = [1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => `
                        <button onclick="handleKeyPress('${num}')" class="bg-slate-700 hover:bg-slate-600 rounded-xl md:rounded-2xl text-2xl md:text-3xl font-bold flex items-center justify-center shadow-sm active:scale-95 transition-all">${num}</button>
                    `).join('');

                    const canSubmit = q.req.every(v => appState.inputs[v] !== '' && appState.inputs[v] !== '-');
                    const submitBtnClass = canSubmit ? 'bg-blue-500 hover:bg-blue-600 active:scale-95 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed';

                    rightPanelHtml = `
                    <div class="w-full md:w-[320px] lg:w-[380px] bg-slate-800 rounded-3xl shadow-xl flex flex-col p-3 md:p-4 lg:p-5 text-white shrink-0">
                        <div class="text-center text-slate-300 text-base md:text-lg font-bold mb-2 md:mb-3">й»һж“Ҡијёе…ҘиҮі ${appState.activeInput}</div>
                        <div class="grid grid-cols-3 gap-2 flex-1">
                            ${numButtons}
                            <button onclick="handleKeyPress('-')" class="bg-orange-500 hover:bg-orange-600 rounded-xl md:rounded-2xl text-3xl md:text-4xl font-bold flex items-center justify-center shadow-sm active:scale-95 transition-all">-</button>
                            <button onclick="handleKeyPress('0')" class="bg-slate-700 hover:bg-slate-600 rounded-xl md:rounded-2xl text-2xl md:text-3xl font-bold flex items-center justify-center shadow-sm active:scale-95 transition-all">0</button>
                            <button onclick="handleKeyPress('DEL')" class="bg-slate-600 hover:bg-slate-500 rounded-xl md:rounded-2xl text-lg md:text-xl font-bold flex items-center justify-center shadow-sm active:scale-95 transition-all text-red-300">еҲӘйҷӨ</button>
                        </div>
                        <button onclick="checkAnswer()" ${!canSubmit ? 'disabled' : ''} class="mt-2 md:mt-3 py-3 md:py-4 rounded-xl md:rounded-2xl text-xl md:text-2xl font-bold tracking-widest transition-all shadow-md flex items-center justify-center space-x-2 ${submitBtnClass}">
                            <i data-lucide="check" class="w-7 h-7"></i><span>жҸҗдәӨзӯ”жЎҲ</span>
                        </button>
                    </div>`;
                }

                // ж§Ӣе»әж•ҙй«”йҒҠжҲІз•«йқў
                html = `
                <div class="w-full h-[100dvh] bg-slate-50 flex flex-col font-sans overflow-hidden">
                    <div class="flex items-center justify-between p-4 bg-white shadow-sm z-10 shrink-0">
                        <button onclick="goHome()" class="flex items-center space-x-2 text-slate-500 hover:text-slate-800 p-2 rounded-lg transition-colors">
                            <i data-lucide="arrow-left" class="w-7 h-7"></i>
                            <span class="text-xl font-bold hidden sm:inline">иҝ”еӣһдё»й Ғ</span>
                        </button>
                        <div class="text-2xl font-bold text-slate-700">зӯүзҙҡ ${appState.level}</div>
                        <div class="flex items-center space-x-4 md:space-x-6 text-lg md:text-xl font-bold">
                            <div class="text-blue-500 bg-blue-50 px-3 md:px-4 py-2 rounded-xl">йЎҢиҷҹ: ${appState.currentIndex + 1} / 10</div>
                            <div class="text-green-500 bg-green-50 px-3 md:px-4 py-2 rounded-xl">еҫ—еҲҶ: ${appState.score}</div>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col md:flex-row p-3 md:p-4 gap-3 md:gap-4 overflow-hidden">
                        <div class="flex-1 bg-white rounded-3xl shadow-md flex flex-col relative transition-colors ${appState.feedback === 'wrong' ? 'border-4 border-red-100' : ''}">
                            
                            ${appState.feedback === 'correct' ? `
                            <div class="absolute inset-0 z-20 flex items-center justify-center rounded-3xl bg-white bg-opacity-90 transition-opacity">
                                <div class="text-green-500 flex flex-col items-center animate-bounce">
                                    <i data-lucide="check" class="w-32 h-32 stroke-[4]"></i>
                                    <span class="text-5xl font-bold mt-4">жӯЈзўәпјҒ</span>
                                </div>
                            </div>` : ''}

                            <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 w-full overflow-hidden">
                                <h3 class="text-slate-400 text-xl md:text-2xl font-bold mb-4 md:mb-8">жұӮжңӘзҹҘеёёж•ё ${q.req.join(', ')}пјҡ</h3>
                                
                                <div class="w-full overflow-x-auto pb-4 mb-6 md:mb-8">
                                    <div class="text-2xl md:text-3xl lg:text-4xl font-bold font-sans text-slate-800 text-center whitespace-nowrap px-4 flex justify-center items-center w-max mx-auto min-w-full">
                                        ${q.lhs} <span class="text-blue-500 font-bold mx-3 md:mx-4">вүЎ</span> ${q.rhs}
                                    </div>
                                </div>

                                <div class="flex flex-wrap justify-center gap-4 md:gap-8">
                                    ${inputBoxesHtml}
                                </div>
                            </div>
                        </div>
                        ${rightPanelHtml}
                    </div>
                </div>`;
            }

            app.innerHTML = html;
            // йҮҚж–°еҲқе§ӢеҢ– Lucide ең–жЁҷ
            lucide.createIcons();
        };

        // еҲқе§ӢжёІжҹ“
        renderApp();
    </script>
</body>
</html>
